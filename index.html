<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Safe · CROW Restriction Checker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5f0e8; color: #2c1810; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #header {
      background: linear-gradient(135deg, #2d5a27, #1a3d15);
      color: white; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.3);
      flex-shrink: 0;
      z-index: 1000;
    }
    #header h1 { font-size: 20px; letter-spacing: -0.5px; }
    #header p  { font-size: 11px; opacity: 0.8; font-family: sans-serif; margin-top: 2px; }

    #toolbar {
      background: #fff; border-bottom: 1px solid #ddd;
      padding: 8px 12px; display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap; flex-shrink: 0;
      z-index: 999;
    }
    .loc-btn {
      padding: 5px 11px; border-radius: 16px;
      border: 2px solid #ddd; background: white;
      color: #555; font-size: 12px; font-family: sans-serif;
      cursor: pointer;
    }
    .loc-btn.active {
      border-color: #2d5a27; background: #2d5a27; color: white; font-weight: bold;
    }
    #active-toggle {
      margin-left: auto; display: flex; align-items: center;
      gap: 6px; font-family: sans-serif; font-size: 12px; cursor: pointer;
    }
    #active-toggle input { width: 15px; height: 15px; accentColor: #2d5a27; }

    #status-bar {
      background: #2d5a27; color: white;
      padding: 5px 12px; font-family: sans-serif; font-size: 11px;
      display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
      flex-shrink: 0; min-height: 26px;
    }

    #map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    #panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: white; border-top: 3px solid #2d5a27;
      max-height: 45%; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 900;
      border-radius: 12px 12px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    }
    #panel.open { transform: translateY(0); }

    #panel-header {
      position: sticky; top: 0; background: white;
      padding: 12px 16px; border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    #panel-title { font-size: 15px; font-weight: bold; font-family: sans-serif; }
    #panel-close {
      background: #f5f0e8; border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #panel-content { padding: 12px 16px 20px; font-family: sans-serif; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .detail-item .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .detail-item .value { font-size: 13px; font-weight: bold; }

    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 10px;
      font-size: 11px; font-weight: bold;
    }
    .badge.active   { background: #dcfce7; color: #166534; }
    .badge.expired  { background: #fee2e2; color: #991b1b; }

    .pdf-btn {
      display: block; width: 100%; padding: 12px;
      background: #2d5a27; color: white; border: none;
      border-radius: 8px; font-size: 13px; font-weight: bold;
      font-family: sans-serif; cursor: pointer; text-decoration: none;
      text-align: center; margin-top: 4px;
    }

    #loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.7); display: flex;
      align-items: center; justify-content: center;
      z-index: 800; pointer-events: none; opacity: 0;
      transition: opacity 0.2s;
    }
    #loading-overlay.show { opacity: 1; pointer-events: all; }
    .spinner { font-size: 32px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .leaflet-popup-content-wrapper { border-radius: 10px; }
    .leaflet-popup-content { font-family: sans-serif; font-size: 13px; line-height: 1.5; }
    .popup-type { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .popup-purpose { color: #555; font-size: 12px; margin-bottom: 8px; }
    .popup-dates { font-size: 11px; color: #777; margin-bottom: 8px; }
    .popup-pdf { color: #2d5a27; font-weight: bold; font-size: 12px; }

    #seasonal-note {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,248,240,0.95); border: 1px solid #e8d5b0;
      border-radius: 8px; padding: 8px 10px;
      font-family: sans-serif; font-size: 11px; color: #666;
      max-width: 200px; line-height: 1.5; z-index: 800;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* Legend */
    #legend {
      position: absolute; bottom: 24px; left: 8px;
      background: rgba(255,255,255,0.95); border-radius: 8px;
      padding: 8px 10px; font-family: sans-serif; font-size: 11px;
      z-index: 800; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border: 1px solid #ddd; line-height: 1.8;
    }
    #legend .leg-title { font-weight: bold; margin-bottom: 4px; font-size: 12px; }
    .leg-row { display: flex; align-items: center; gap: 6px; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="header">
  <span style="font-size:30px">🐕</span>
  <div>
    <h1>Dog Safe</h1>
    <p>Live CROW Act dog restrictions · England · Natural England data</p>
  </div>
</div>

<div id="toolbar">
  <div id="loc-buttons"></div>
  <label id="active-toggle">
    <input type="checkbox" id="active-only" checked />
    Active only
  </label>
</div>

<div id="status-bar">
  <span id="status-text">Select an area to begin</span>
</div>

<div id="map-container">
  <div id="map"></div>

  <div id="loading-overlay">
    <div>
      <div class="spinner">🔍</div>
    </div>
  </div>

  <div id="seasonal-note">
    🪶 <strong>Always:</strong> Short lead near livestock &amp; 1 Mar–31 Jul near nesting birds
  </div>

  <div id="legend">
    <div class="leg-title">Dog Restrictions</div>
    <div class="leg-row"><div class="leg-dot" style="background:#ef4444"></div> No Dogs</div>
    <div class="leg-row"><div class="leg-dot" style="background:#f97316"></div> No Dogs (except assistance)</div>
    <div class="leg-row"><div class="leg-dot" style="background:#eab308"></div> Dogs on Lead / Routes</div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <div id="panel-title">Restriction Details</div>
      <button id="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-content"></div>
  </div>
</div>

<script>
const LOCATIONS = [
  { name: "Yorkshire Dales", lat: 54.1,  lng: -2.1  },
  { name: "Peak District",   lat: 53.4,  lng: -1.8  },
  { name: "Dartmoor",        lat: 50.6,  lng: -3.9  },
  { name: "Lake District",   lat: 54.5,  lng: -3.1  },
  { name: "North York Moors",lat: 54.3,  lng: -0.9  },
  { name: "Exmoor",          lat: 51.1,  lng: -3.6  },
];

const TYPE_INFO = {
  "02": { label: "No Dogs",                              color: "#ef4444", fill: "#ef4444" },
  "04": { label: "No Dogs (except assistance dogs)",     color: "#f97316", fill: "#f97316" },
  "03": { label: "No Dogs (except guide/hearing dogs)",  color: "#f97316", fill: "#f97316" },
  "05": { label: "Dogs on Leads",                        color: "#eab308", fill: "#eab308" },
  "09": { label: "Dogs on Fenced Routes Only",           color: "#eab308", fill: "#eab308" },
  "10": { label: "Marked Routes, Dogs on Leads",         color: "#eab308", fill: "#eab308" },
};

const PURPOSE_LABELS = {
  "16": "🪶 Grouse disturbance",
  "17": "🐑 Lambing",
  "14": "🦎 Sensitive wildlife",
  "03": "🐄 Livestock disturbance",
  "05": "🔥 Fire prevention",
  "01": "⚠️ Public safety",
  "07": "🌿 Land management",
};

// --- Map init ---
const map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

let restrictionLayer = L.geoJSON(null, {
  style: styleFeature,
  onEachFeature: onEachFeature
}).addTo(map);

// --- Location buttons ---
const locContainer = document.getElementById('loc-buttons');
locContainer.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap';
let activeLocName = null;

LOCATIONS.forEach(loc => {
  const btn = document.createElement('button');
  btn.className = 'loc-btn';
  btn.textContent = loc.name;
  btn.onclick = () => {
    map.setView([loc.lat, loc.lng], 11);
    document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLocName = loc.name;
  };
  locContainer.appendChild(btn);
});

// --- Active only toggle ---
document.getElementById('active-only').addEventListener('change', () => {
  fetchAndRender();
});

// --- Fetch ---
async function fetchAndRender() {
  const b = map.getBounds();
  const activeOnly = document.getElementById('active-only').checked;

  setLoading(true);

  const minLng = b.getWest(), minLat = b.getSouth();
  const maxLng = b.getEast(), maxLat = b.getNorth();

  const dateFilter = activeOnly
    ? `+AND+END_DATE>=CURRENT_TIMESTAMP+AND+START_DATE<=CURRENT_TIMESTAMP`
    : "";

  const types = "(TYPE%3D'02'+OR+TYPE%3D'04'+OR+TYPE%3D'03'+OR+TYPE%3D'05'+OR+TYPE%3D'09'+OR+TYPE%3D'10')";

  const url = `https://services.arcgis.com/JJzESW51TqeY9uat/arcgis/rest/services/OASYS_RESTRICTION_PRD_VIEW/FeatureServer/0/query`
    + `?geometry=${minLng},${minLat},${maxLng},${maxLat}`
    + `&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects`
    + `&where=${types}${dateFilter}`
    + `&outFields=CASE_NUMBER,TYPE,PURPOSE,START_DATE,END_DATE,VIEW_MAP`
    + `&outSR=4326&returnGeometry=true&f=geojson`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    // Deduplicate by CASE_NUMBER
    const seen = new Map();
    (data.features || []).forEach(f => {
      const cn = f.properties.CASE_NUMBER;
      if (!seen.has(cn) || f.properties.END_DATE > seen.get(cn).properties.END_DATE)
        seen.set(cn, f);
    });
    const unique = { type: "FeatureCollection", features: Array.from(seen.values()) };

    restrictionLayer.clearLayers();
    restrictionLayer.addData(unique);

    // Status
    const count = unique.features.length;
    const typeCounts = {};
    unique.features.forEach(f => {
      const t = f.properties.TYPE;
      typeCounts[t] = (typeCounts[t]||0)+1;
    });

    if (count === 0) {
      setStatus(`✅ No dog restrictions in this area${activeOnly?" right now":""}`, "#166534");
    } else {
      const summary = Object.entries(typeCounts)
        .map(([t,c]) => `${c}× ${TYPE_INFO[t]?.label||t}`)
        .join("  ·  ");
      setStatus(`🐕 ${count} restriction${count!==1?"s":""} found  ·  ${summary}`);
    }
  } catch(e) {
    setStatus("⚠️ Could not load data — check connection", "#991b1b");
  }

  setLoading(false);
}

// --- Style ---
function styleFeature(feature) {
  const info = TYPE_INFO[feature.properties.TYPE] || {};
  const now  = Date.now();
  const active = feature.properties.START_DATE <= now && feature.properties.END_DATE >= now;
  return {
    color:       info.color || "#888",
    fillColor:   info.fill  || "#888",
    fillOpacity: active ? 0.35 : 0.15,
    weight:      active ? 2.5 : 1.5,
    dashArray:   active ? null : "6,4",
    opacity:     active ? 1 : 0.6,
  };
}

// --- Popups ---
function onEachFeature(feature, layer) {
  const p      = feature.properties;
  const info   = TYPE_INFO[p.TYPE] || {};
  const now    = Date.now();
  const active = p.START_DATE <= now && p.END_DATE >= now;
  const pdfUrl = extractPdf(p.VIEW_MAP);
  const purpose= PURPOSE_LABELS[p.PURPOSE] || "";

  const popup = `
    <div class="popup-type" style="color:${info.color||'#333'}">${info.label || p.TYPE}</div>
    ${purpose ? `<div class="popup-purpose">${purpose}</div>` : ""}
    <div class="popup-dates">
      From: ${formatDate(p.START_DATE)}<br>
      Until: ${formatDate(p.END_DATE)}
    </div>
    <span class="badge ${active?'active':'expired'}">${active?"ACTIVE":"EXPIRED"}</span>
    ${pdfUrl ? `<br><br><a class="popup-pdf" href="${pdfUrl}" target="_blank">📄 View Official Map PDF →</a>` : ""}
  `;

  layer.bindPopup(popup, { maxWidth: 240 });

  layer.on('click', () => openPanel(feature));

  layer.on('mouseover', function() {
    this.setStyle({ fillOpacity: 0.6, weight: 3.5 });
  });
  layer.on('mouseout', function() {
    restrictionLayer.resetStyle(this);
  });
}

// --- Bottom Panel ---
function openPanel(feature) {
  const p      = feature.properties;
  const info   = TYPE_INFO[p.TYPE] || {};
  const now    = Date.now();
  const active = p.START_DATE <= now && p.END_DATE >= now;
  const pdfUrl = extractPdf(p.VIEW_MAP);
  const purpose= PURPOSE_LABELS[p.PURPOSE] || "—";

  document.getElementById('panel-title').textContent = info.label || p.TYPE;
  document.getElementById('panel-title').style.color = info.color || "#333";

  document.getElementById('panel-content').innerHTML = `
    <div class="detail-grid">
      <div class="detail-item">
        <div class="label">Status</div>
        <div class="value"><span class="badge ${active?'active':'expired'}">${active?"ACTIVE":"EXPIRED"}</span></div>
      </div>
      <div class="detail-item">
        <div class="label">Case Number</div>
        <div class="value">${p.CASE_NUMBER}</div>
      </div>
      <div class="detail-item">
        <div class="label">Purpose</div>
        <div class="value">${purpose}</div>
      </div>
      <div class="detail-item">
        <div class="label">Type Code</div>
        <div class="value">${p.TYPE}</div>
      </div>
      <div class="detail-item">
        <div class="label">From</div>
        <div class="value">${formatDate(p.START_DATE)}</div>
      </div>
      <div class="detail-item">
        <div class="label">Until</div>
        <div class="value">${formatDate(p.END_DATE)}</div>
      </div>
    </div>
    ${pdfUrl ? `<a class="pdf-btn" href="${pdfUrl}" target="_blank">📄 View Official Restriction Map (PDF)</a>` : ""}
    <p style="margin-top:12px;font-size:11px;color:#888;line-height:1.5">
      Data source: Natural England · CROW Act 2000<br>
      Always keep dogs on a lead near livestock.
    </p>
  `;

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// --- Helpers ---
function formatDate(ts) {
  if (!ts) return "Unknown";
  return new Date(ts).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
}

function extractPdf(vm) {
  const m = vm && vm.match(/href="([^"]+)"/);
  return m ? m[1] : null;
}

function setLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('show', on);
}

function setStatus(text, color) {
  const el = document.getElementById('status-text');
  el.textContent = text;
  el.style.color = color || "white";
}

// --- Map events ---
map.on('moveend', fetchAndRender);

// --- Start at Yorkshire Dales ---
map.setView([54.1, -2.1], 11);
document.querySelector('.loc-btn').classList.add('active');
</script>
</body>
</html>
